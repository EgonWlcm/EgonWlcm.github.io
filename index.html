<!DOCTYPE html>
<html lang="nl">
<head>
    <!-- Line below is needed for mediaqueries/mobile view -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta charset="UTF-8">
    <title>Mijn Portfolio</title>
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/style.css">
</head>
    
<div id="lightbox" class="lightbox">
    <span class="close" onclick="closeLightbox()">×</span>
    <img id="lightbox-img">
</div>
    
<body>

    <!-- HERO -->
    <header class="hero">

        <div class="profile">

            <img src="img/me.jpg" alt="Mijn foto" class="profile-pic">

            <img src="img/signature.png" alt="Handtekening" class="signature">

        </div>

        <h1 class="name">Egon Wellecommen</h1>

    </header>

    <!-- KNOPPEN -->
    <div class="buttons">
        <button onclick="changeImages('set1')"  id="btn1">Travel / Nature</button>
        <button onclick="changeImages('set2')"  id="btn2">Animals</button>
        <button onclick="changeImages('set3')"  id="btn3">Paintings</button>
    </div>

    <!-- GALERIJ -->
    <div class="gallery" id="gallery"></div>
    <script src="js/script.js" defer></script>
</body>
</html>
